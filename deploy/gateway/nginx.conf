# Illustrative reverse-proxy configuration. TLS certificates, DNS names,
# access logs, WAF integration, and trusted proxy ranges are environment-specific.

limit_req_zone $binary_remote_addr zone=ai_gateway_per_ip:10m rate=10r/s;

upstream ai_gateway {
    server gateway:8080;
    keepalive 64;
}

server {
    listen 443 ssl http2;
    server_name ai.example.invalid;

    ssl_certificate     /etc/nginx/tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/tls/private-key.pem;

    client_max_body_size 128k;

    location / {
        limit_req zone=ai_gateway_per_ip burst=20 nodelay;
        proxy_pass http://ai_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $request_id;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
